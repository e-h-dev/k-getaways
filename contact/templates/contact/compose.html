{% extends "base.html" %}

{% block extra_title %} - Create Message{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-1 col-md-4"></div>
        <div class="col-10 col-md-4">
            <h1>Compose message</h1>
            <hr>
        </div>
        <div class="col-1 col-md-4"></div>
    </div>
</div>
<section>
    <div class="container-fluid">
        <div class="row">
            <div class="col-1 col-md-2"></div>
            <div class="col-10 col-md-8">
                <div class="form-container compose-form">
                    <form method="POST" action="{% url 'compose_message' rental.id %}">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-btn">Send Message</button>
                    </form>
                </div>
            </div>
            <div class="col-1 col-md-2"></div>
        </div>
    </div>
</section>

{% endblock %}
